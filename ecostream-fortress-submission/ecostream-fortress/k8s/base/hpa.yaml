apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecostream-hpa
  namespace: ecostream
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecostream-app
  minReplicas: 3
  maxReplicas: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
