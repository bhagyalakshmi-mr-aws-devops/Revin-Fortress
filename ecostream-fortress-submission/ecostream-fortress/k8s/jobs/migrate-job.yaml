apiVersion: batch/v1
kind: Job
metadata:
  name: ecostream-db-migrate
  namespace: ecostream
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: REPLACE_ME_MIGRATION_IMAGE:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database_url
